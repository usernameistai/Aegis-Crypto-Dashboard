name: React Vite CI

on:
  push:
    branches: [ "main" ]

jobs:
  verify-code:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout project code
      uses: actions/checkout@v6

    - name: Setup Node.js environment
      uses: actions/setup-node@v6
      with:
        node-version: '24'
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Run Vite production build
      run: npm run build
